<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escrituração</title>

    <link rel="stylesheet" href="../pagina_principal/index.css">

    <link rel="stylesheet" href="escrituracao.css">
</head>

<body>
    <div class="sidebar">
        <h2>Menu</h2>

        <a href="../pagina_principal/index.html">Início</a>

        <a href="../pagina_principal/index.css">Início</a>

        <a href="../processamento/notas.html">Notas</a>
        <a href="escrituracao.html">Escrituração</a>
    </div>

<div class="content">
    <div class="main-container">

        <!-- LADO ESQUERDO -->
        <div class="left">
            <h3>Dados</h3>

            <select id="coligada">
                <option value="">Selecione uma coligada</option>
                <option value="1">Urban Residence</option>
                <option value="2">Heritage Tower</option>
            </select><br><br>

            <input type="text" id="buscaCliente" placeholder="Digite o nome do cliente...">
            <div id="resultadoClientes" style="max-height: 200px; overflow-y: auto; font-size: 14px;"></div><br>

            <input type="text" id="nome" placeholder="Nome" readonly>
            <input type="text" id="cpf" placeholder="CPF" readonly><br><br>
            <input type="text" id="email" placeholder="E-Mail" readonly>
            <input type="date" id="nascimento" readonly><br><br>
            <input type="text" id="telefone" placeholder="Telefone" readonly>

            <input type="text" id="cidade" placeholder="Cidade" readonly><br><br>
            <input type="text" id="rua" placeholder="Rua" readonly>
            <input type="text" id="numero" placeholder="Número" readonly><br><br>
            <input type="text" id="bairro" placeholder="Bairro" readonly>
            <input type="text" id="cep" placeholder="CEP" readonly><br><br>
            <input type="text" id="estado" placeholder="Estado (UF)" readonly><br><br>

            <hr><br>

            <input type="text" id="apartamento" placeholder="Apartamento">
            <input type="text" id="pavimento" placeholder="Pavimento"><br><br>
            <input type="text" id="matricula" placeholder="Matrícula">

            <input type="text" id="valor" placeholder="Valor Pago"><br><br>
            <input type="date" id="data_pag" placeholder="Nome">

            <input type="text" id="bancoConta" placeholder="Conta"><br><br>
            <input type="text" id="bancoAgencia" placeholder="Agencia">
            <input type="text" id="bancoCC" placeholder="Conta Corrente"><br><br>

            <button onclick="gerarDoc()">Gerar DOCX</button>
        </div>

        <!-- LADO DIREITO -->
        <div class="right">
            <h2>Preview</h2>
            <div id="preview"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<script src="escrituracao.js"></script>
</body>
</html>
