<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Notas Fiscais</title>
    <link rel="stylesheet" href="notas.css">
</head>
<body>

<div class="sidebar">
    <h2>Menu</h2>
    <a href="../pagina_principal/index.html">Início</a>
    <a href="../processamento/notas.html">Notas</a>
    <a href="../escrituracao/escrituracao.html">Escrituração</a>
</div>

<div class="form">
    <form id="formMovimento">
        <label>CÓDIGO COLIGADA:</label><br>
        <input type="text" id="CODCOLIGADA" readonly>
        <input type="text" id="CO_NOME" readonly>
        <button type="button" class="select-btn" id="btnColigada">...</button><br><br>

        <label>FORNECEDOR:</label><br>
        <input type="text" id="CODCFO" readonly>
        <input type="text" id="FO_NOME" readonly>
        <button type="button" class="select-btn" id="btnFornecedor">...</button><br><br>

        <label>NUMERO DO MOVIMENTO:</label><br>
        <input type="number" id="NUMEROMOV" required><br><br>

        <label>STATUS:</label><br>
        <input type="text" id="STATUS" required><br><br>

        <label>LOCAL DE ESTOQUE:</label><br>
        <input type="text" id="COD_LOC" readonly>
        <input type="text" id="LOC_NOME" readonly>
        <button type="button" class="select-btn" id="btnLocal">...</button><br><br>

        <label>SERIE:</label><br>
        <input type="text" id="COD_SERIE" readonly>
        <input type="text" id="SERIE_NOME" readonly>
        <button type="button" class="select-btn" id="btnSerie">...</button><br><br>

        <label>DATA DE EMISSÃO:</label><br>
        <input type="date" id="DATAEMISSAO" required><br><br>

        <label>DATA DE SAIDA:</label><br>
        <input type="date" id="DATASAIDA" required><br><br>

        <label>DATA DE RECEBIMENTO:</label><br>
        <input type="date" id="DATARECEB" required><br><br>
        
        <label>DEPARTAMENTO:</label><br>
        <input type="text" id="COD_DEPTO" readonly>
        <input type="text" id="DEPTO_NOME" readonly>
        <button type="button" class="select-btn" id="btnDepartamento">...</button><br><br>

        <label>FORMA DE PAGAMENTO:</label><br>
        <input type="text" id="COD_PAG" readonly>
        <input type="text" id="PAG_NOME" readonly>
        <button type="button" class="select-btn" id="btnPagamento">...</button><br><br>

        <label>CARTÃO:</label><br>
        <input type="number" id="COD_CARTAO" readonly><br><br>

        <label>CLASSIFICAÇÃO:</label><br>
        <input type="number" id="COD_CLASS" readonly><br><br>

        <button type="submit">Salvar Nota</button>
    </form>

    <p id="resultado"></p>
</div>

<div id="modalColigada" class="modal">
    <div class="modal-content">
        <h3>Escolha uma coligada</h3>
        <input type="text" id="pesquisaColigada" placeholder="Pesquisar...">
        <div id="listaColigada"></div>
        <button class="close-btn" onclick="fecharModal()">x</button>
    </div>
</div>

<div id="modalFornecedor" class="modal">
    <div class="modal-content">
        <h3>Escolha um fornecedor</h3>
        <input type="text" id="pesquisaFornecedor" placeholder="Pesquisar...">
        <div id="listaFornecedor"></div>
        <button class="close-btn" onclick="fecharModal()">x</button>
    </div>
</div>

<div id="modalLocal" class="modal">
    <div class="modal-content">
        <h3>Escolha um Local de Estoque</h3>
        <input type="text" id="pesquisaLocal" placeholder="Pesquisar...">
        <div id="listaLocal"></div>
        <button class="close-btn" onclick="fecharModal()">x</button>
    </div>
</div>

<div id="modalSerie" class="modal">
    <div class="modal-content">
        <h3>Escolha um Tipo de Série</h3>
        <input type="text" id="pesquisaSerie" placeholder="Pesquisar...">
        <div id="listaSerie"></div>
        <button class="close-btn" onclick="fecharModal()">x</button>
    </div>
</div>

<div id="modalDepartamento" class="modal">
    <div class="modal-content">
        <h3>Escolha um departamento</h3>
        <input type="text" id="pesquisaDepartamento" placeholder="Pesquisar...">
        <div id="listaDepartamento"></div>
        <button class="close-btn" onclick="fecharModal()">x</button>
    </div>
</div>

<div id="modalPagamento" class="modal">
    <div class="modal-content">
        <h3>Escolha uma forma de pagamento</h3>
        <input type="text" id="pesquisaPagamento" placeholder="Pesquisar...">
        <div id="listaPagamento"></div>
        <button class="close-btn" onclick="fecharModal()">x</button>
    </div>
</div>

<script>
document.getElementById("formMovimento").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Pega os valores do formulário
    const CODCOLIGADA = document.getElementById("CODCOLIGADA").value;
    const CODCFO = document.getElementById("CODCFO").value;
    const NUMEROMOV = document.getElementById("NUMEROMOV").value;
    const STATUS = document.getElementById("STATUS").value;
    const COD_LOC = document.getElementById("COD_LOC").value;
    const SERIE = document.getElementById("SERIE").value;
    const DATAEMISSAO = document.getElementById("DATAEMISSAO").value;
    const DATASAIDA = document.getElementById("DATASAIDA").value;
    const DATARECEB = document.getElementById("DATARECEB").value;
    const COD_DEPTO = document.getElementById("COD_DEPTO").value;
    const COD_PAG = document.getElementById("COD_PAG").value;
    const COD_CARTAO = document.getElementById("COD_CARTAO").value;
    const COD_CLASS = document.getElementById("COD_CLASS").value;

    try {
        const response = await fetch("http://192.168.18.76:3000/notas", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                CODCOLIGADA: parseInt(CODCOLIGADA),
                CODCFO: CODCFO,
                NUMEROMOV: parseInt(NUMEROMOV),
                STATUS: STATUS,
                COD_LOC: COD_LOC,
                SERIE: SERIE,
                DATAEMISSAO: DATAEMISSAO,
                DATASAIDA: DATASAIDA,
                DATARECEB: DATARECEB,
                COD_DEPTO: COD_DEPTO,
                COD_PAG: parseInt(COD_PAG),
                COD_CARTAO: parseInt(COD_CARTAO),
                COD_CLASS: parseInt(COD_CLASS)
            })
        });

        const text = await response.text();
        document.getElementById("resultado").innerText = text;

    } catch (err) {
        console.error(err);
        document.getElementById("resultado").innerText = "Erro ao enviar";
    }
});
</script>
<script src="scripts/pagamento.js"></script>
<script src="scripts/departamento.js"></script>
<script src="scripts/coligada.js"></script>
<script src="scripts/local.js"></script>
<script src="scripts/fornecedor.js"></script>
<script src="scripts/serie.js"></script>

</body>
</html>
